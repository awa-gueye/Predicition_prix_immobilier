<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion -- ImmoPredict SN</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0B1D37;position:relative;overflow:hidden}
body::before{content:'';position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1613977257363-707ba9348227?w=1400&q=80') center/cover no-repeat;opacity:.08}
body::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(14,107,74,.15),transparent 60%),radial-gradient(ellipse at 70% 70%,rgba(201,168,76,.1),transparent 50%)}
.card{position:relative;z-index:2;background:#fff;border-radius:20px;box-shadow:0 24px 80px rgba(0,0,0,.3);width:100%;max-width:440px;overflow:hidden;margin:1rem}
.card-hdr{background:linear-gradient(135deg,#0B1D37,#132D52);padding:2.5rem 2rem 2rem;text-align:center;position:relative;overflow:hidden}
.card-hdr::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.15),transparent 70%)}
.logo{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#C9A84C,#E2C47A);display:flex;align-items:center;justify-content:center;margin:0 auto 1.1rem;box-shadow:0 4px 20px rgba(201,168,76,.35);position:relative;z-index:2}
.logo i{color:#0B1D37;font-size:1.3rem}
.card-hdr h1{font-family:'Playfair Display',serif;font-size:1.7rem;color:#fff;margin:0 0 .3rem;position:relative;z-index:2}
.card-hdr p{color:rgba(255,255,255,.45);font-size:.82rem;position:relative;z-index:2}
.card-body{padding:2rem}
.fg{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1rem}
.fg label{font-size:.82rem;font-weight:600;color:#374151;display:flex;align-items:center;gap:.4rem}
.fg label i{color:#C9A84C;font-size:.72rem;width:14px}
.fg input{padding:.62rem .95rem;border:1.5px solid #E2E6F0;border-radius:10px;font-size:.9rem;font-family:inherit;color:#0F172A;outline:none;transition:all .25s;width:100%}
.fg input:focus{border-color:#C9A84C;box-shadow:0 0 0 4px rgba(201,168,76,.1)}
.err{background:#FEF2F2;border:1px solid #FECACA;color:#991B1B;padding:.65rem .9rem;border-radius:9px;font-size:.82rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.remember{display:flex;align-items:center;gap:.5rem;margin-bottom:1.2rem}
.remember input{accent-color:#C9A84C}
.remember label{font-size:.82rem;color:#7A8599}
.btn{width:100%;padding:.75rem;background:linear-gradient(135deg,#C9A84C,#E2C47A);color:#0B1D37;border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:.4rem;box-shadow:0 4px 16px rgba(201,168,76,.3)}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(201,168,76,.4)}
.card-ftr{text-align:center;padding:1.2rem;border-top:1px solid #F4F6FA;font-size:.82rem;color:#7A8599}
.card-ftr a{color:#C9A84C;font-weight:600;text-decoration:none}
.card-ftr a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="card">
  <div class="card-hdr">
    <div class="logo"><i class="fas fa-building"></i></div>
    <h1>Bienvenue</h1>
    <p>Connectez-vous a ImmoPredict SN</p>
  </div>
  <div class="card-body">
    {% if error %}
    <div class="err"><i class="fas fa-exclamation-circle"></i>{{ error }}</div>
    {% endif %}
    <form method="POST">
      {% csrf_token %}
      <div class="fg"><label><i class="fas fa-user"></i>Nom d'utilisateur</label><input type="text" name="username" placeholder="Votre identifiant" required autofocus autocomplete="username"></div>
      <div class="fg"><label><i class="fas fa-lock"></i>Mot de passe</label><input type="password" name="password" placeholder="Votre mot de passe" required autocomplete="current-password"></div>
      <div class="remember"><input type="checkbox" name="remember" id="rem"><label for="rem">Se souvenir de moi</label></div>
      <button type="submit" class="btn"><i class="fas fa-sign-in-alt"></i>Se connecter</button>
    </form>
  </div>
  <div class="card-ftr">Pas encore de compte ? <a href="{% url 'register' %}">S'inscrire</a></div>
</div>
</body>
</html>
