name: Build and Push Docker Image

on:
  push:
    branches:
      - main  # Se déclenche sur chaque push sur main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Récupérer le codee
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Se connecter à Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️⃣ Builder l’image Docker
      - name: Build Docker image
        run: |
          IMAGE_TAG=${GITHUB_SHA::7}  # 7 premiers caractères du commit SHA
          docker build -t ba2664890/scrapyd-immo:$IMAGE_TAG .
          docker tag ba2664890/scrapyd-immo:$IMAGE_TAG ba2664890/scrapyd-immo:latest

      # 4️⃣ Pusher l’image Docker sur Docker Hub
      - name: Push Docker image
        run: |
          IMAGE_TAG=${GITHUB_SHA::7}
          docker push ba2664890/scrapyd-immo:$IMAGE_TAG
          docker push ba2664890/scrapyd-immo:latest
